name: mobile-smoke

on:
  pull_request:
    paths:
      - "app/**"
      - "backend/**"
      - "packages/shared/**"
      - ".maestro/**"
      - "scripts/maestro/**"
      - ".github/workflows/**"
      - "Makefile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - "app/app.json"
  workflow_dispatch:

jobs:
  android-smoke:
    name: android-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MAESTRO_OUTPUT_ROOT: ${{ github.workspace }}/.artifacts/maestro
      SMOKE_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      MAESTRO_CLI_NO_ANALYTICS: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        run: |
          python -m pip install uv
          uv sync --directory backend

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android smoke with booted emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_7
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim
          disable-animations: true
          script: bash -c "export MAESTRO_DEVICE_ID=\$(adb devices | awk 'NR > 1 && \$2 == \"device\" { print \$1; exit }'); ./scripts/maestro/run-ci.sh android"

      - name: Upload Android smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voice-notes-smoke-android
          path: .artifacts/maestro/ci/android-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn

  ios-smoke:
    name: ios-smoke
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      MAESTRO_OUTPUT_ROOT: ${{ github.workspace }}/.artifacts/maestro
      SMOKE_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      MAESTRO_CLI_NO_ANALYTICS: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        run: |
          python -m pip install uv
          uv sync --directory backend

      - name: Install Maestro CLI and idb
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          brew tap facebook/fb
          brew install idb-companion

      - name: Boot iOS simulator
        run: |
          DEVICE_UDID=$(xcrun simctl create "iPhone 16" "com.apple.CoreSimulator.SimDeviceType.iPhone-16" 2>/dev/null || \
            xcrun simctl list devices available | grep "iPhone 16 " | head -1 | grep -oE '[A-F0-9-]{36}')
          xcrun simctl boot "$DEVICE_UDID"
          echo "MAESTRO_DEVICE_ID=$DEVICE_UDID" >> "$GITHUB_ENV"

      - name: Run iOS smoke
        run: ./scripts/maestro/run-ci.sh ios

      - name: Upload iOS smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voice-notes-smoke-ios
          path: .artifacts/maestro/ci/ios-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
